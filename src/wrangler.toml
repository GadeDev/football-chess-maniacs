name = "football-chess-maniacs"
main = "worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ── Observability（Workers Logs: tail以外で過去ログを参照可能にする） ──
[observability]
enabled = true

# ── Durable Objects ──
[durable_objects]
bindings = [
  { name = "GAME_SESSION", class_name = "GameSession" },
  { name = "MATCHMAKING", class_name = "Matchmaking" },
]

# ── Worker Custom Domains ──
# Apex/www はWorkerで受け、API以外のGETはPages本体へプロキシする。
[[routes]]
pattern = "footballchess.io"
custom_domain = true

[[routes]]
pattern = "www.footballchess.io"
custom_domain = true

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameSession", "Matchmaking"]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "fcms"
database_id = "9326989a-a33e-487b-bf07-bc82f7a943eb"
migrations_dir = "migrations"

# ── KV Namespace ──
[[kv_namespaces]]
binding = "KV"
id = "2f0ad03ea9924313afdf187a359170c7"

# ── R2 Bucket ──
[[r2_buckets]]
binding = "R2"
bucket_name = "fcms-storage"

# ── Queues (Producer) ──
[[queues.producers]]
binding = "MATCH_RESULT_QUEUE"
queue = "fcms-match-results"

# ── Queues (Consumer) ──
[[queues.consumers]]
queue = "fcms-match-results"
max_batch_size = 10
max_batch_timeout = 30

# ── Workers AI ──
[ai]
binding = "AI"

# ── Service Bindings ──
[[services]]
binding = "PLATFORM"
service = "fc-platform-api"

# ── Environment Variables ──
[vars]
CORS_ORIGIN = "https://footballchess.io,https://www.footballchess.io,https://football-chess-maniacs.pages.dev,https://universo-futbol.com,https://www.universo-futbol.com"
GAME_CLIENT_URL = "https://footballchess.io"
PLATFORM_API_BASE = "https://fc-platform-api.yanagiho.workers.dev"
PLATFORM_GAME_ID = "football_chess_maniacs"
PLATFORM_SAVE_SLOT_SKU = "fcms_save_slots_9"
PLATFORM_SUBSCRIPTION_SKU = "uf_subscription_monthly_premium"
SUBSCRIPTION_SAVE_SLOT_BONUS = "3"
AI_MODEL_ID = "@cf/google/gemma-3-12b-it"

# ── Secrets (set via `wrangler secret put`) ──
# PLATFORM_JWKS_URL
# PLATFORM_JWT_ISSUER
# PLATFORM_JWT_AUDIENCE
# PLATFORM_GAME_SERVER_TOKEN
# PLATFORM_HMAC_SECRET
# PLATFORM_SERVICE_API_KEY (optional internal AI debug key)
# PLATFORM_CHECKOUT_RETURN_URL (optional override; origin must be allowed by Platform)

# ════════════════════════════════════════════════════════════════
# Staging: connects to Football-Platform's Staging API, never production.
# All D1/KV/R2/Queue resources below are staging-only (newly created,
# distinct IDs from production) — no production data is shared or copied.
# No [[routes]] — this env only serves *.workers.dev, so footballchess.io
# stays bound to the top-level (production) Worker only.
# workers_dev is set explicitly (not inherited from the top level into
# named environments in this Wrangler version).
# ════════════════════════════════════════════════════════════════
[env.staging]
workers_dev = true
routes = []

[env.staging.observability]
enabled = true

[env.staging.durable_objects]
bindings = [
  { name = "GAME_SESSION", class_name = "GameSession" },
  { name = "MATCHMAKING", class_name = "Matchmaking" },
]

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["GameSession", "Matchmaking"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "fcms-staging"
database_id = "af7a2b04-90c7-44c4-a016-7e1fc02f50e6"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "c90fd5dfa3df42c2b75ea10082826e3f"

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "fcms-storage-staging"

[[env.staging.queues.producers]]
binding = "MATCH_RESULT_QUEUE"
queue = "fcms-match-results-staging"

[[env.staging.queues.consumers]]
queue = "fcms-match-results-staging"
max_batch_size = 10
max_batch_timeout = 30

[env.staging.ai]
binding = "AI"

[[env.staging.services]]
binding = "PLATFORM"
service = "fc-platform-api-staging"

[env.staging.vars]
CORS_ORIGIN = "https://fcms-staging.pages.dev"
GAME_CLIENT_URL = "https://fcms-staging.pages.dev"
PLATFORM_API_BASE = "https://fc-platform-api-staging.yanagiho.workers.dev"
PLATFORM_GAME_ID = "football_chess_maniacs"
PLATFORM_SAVE_SLOT_SKU = "fcms_save_slots_9"
PLATFORM_SUBSCRIPTION_SKU = "uf_subscription_monthly_premium"
SUBSCRIPTION_SAVE_SLOT_BONUS = "3"
AI_MODEL_ID = "@cf/google/gemma-3-12b-it"
